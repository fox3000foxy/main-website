	<script>
		function hexToRgb(hex) {
		  var result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
		  return result ? {
			r: parseInt(result[1], 16),
			g: parseInt(result[2], 16),
			b: parseInt(result[3], 16)
		  } : null;
		}

		function rgbToHex(r, g, b) {
		  return "#" + componentToHex(r) + componentToHex(g) + componentToHex(b);
		}
		
		function changeColor(){
			let newColor = hexToRgb(superColor.value)
			if(!reaction.classList.contains("reactionMe-1PwQAc")){
				if(isSuper.checked){
					counterReact.style.color = `rgb(${newColor.r+5}, ${newColor.g+35}, ${newColor.b+51})`;
					reaction.style.borderColor = `rgb(${newColor.r+5}, ${newColor.g+35}, ${newColor.b+51})`;
					reaction.style.background=`rgba(${newColor.r}, ${newColor.g}, ${newColor.b}, 0.2)`;
				}
				else {
					<!-- counterReact.style.color = `var(--interactive-normal)`; -->
					reaction.style.background=``;
					reaction.style.borderColor = ``;
				}
				reaction.style.borderColor=``;
			}
			else {
				if(isSuper.checked){
					counterReact.style.color = `rgb(${newColor.r+5}, ${newColor.g+35}, ${newColor.b+51})`;
					reaction.style.borderColor = `rgb(${newColor.r+5}, ${newColor.g+35}, ${newColor.b+51})`;
					reaction.style.background=`rgba(${newColor.r}, ${newColor.g}, ${newColor.b}, 0.2)`;
				}
				else {
					counterReact.style.color = `var(--interactive-normal)`;
					reaction.style.borderColor = ``;
					reaction.style.background=``;
				}
				counterReact.style.color = `rgb(254,254,254)`;
			}
		}

		<!-- alert(rgbToHex(0, 51, 255)); // #0033ff -->
		superColor.value="#ff0000"
		superColor.oninput = ()=>{
			changeColor()
		}
		<!-- reaction.style.borderColor="rgb(245, 197, 168)"; -->
		isSuper.onclick = ()=>{
			if(isSuper.checked){
				changeColor()
				//rgba(235, 158, 208, 0.2)
				<!-- reaction.style.color = "rgb(224, 224, 224)" -->
				<!-- hexToRgb -->
				<!-- reaction.style.borderColor = "hsl(var(--white-500-hsl)/.2)"; -->
				isSuperTrue.style.display = ""
			}
			else {
				reaction.style.background=""
				if(!reaction.classList.contains("reactionMe-1PwQAc")){
					counterReact.style.color = `var(--interactive-normal)`;
				}
				else {
					counterReact.style.color = "rgb(254,254,254)"
				}
				<!-- reaction.style.borderOpacity="0"; -->
				isSuperTrue.style.display = "none"
				reaction.style.borderColor = ``;
			}
			<!-- console.log(reaction.style.background) -->
		}
		source.onkeydown = ()=>{
			setTimeout(()=>{
				emoteImg.src = `https://cdn.discordapp.com/emojis/${source.value}.webp?size=22&quality=lossless`
			})
		}
		counter.onkeydown = ()=>{
			setTimeout(()=>{
				counterReact.innerText = counter.value%100000 || 640
				<!-- counterReact.style.minWidth = (9*counterReact.innerText.length) +"px;" -->
			})
		}
		reaction.onclick = ()=>{
			console.log(reaction.classList)
			if(!reaction.classList.contains("reactionMe-1PwQAc")){
				reaction.classList.add("reactionMe-1PwQAc")
				if(isSuper.checked) {
					changeColor()
				}
				else
					counterReact.style.color = `rgb(254,254,254)`;
			}
			else{
				reaction.classList.remove("reactionMe-1PwQAc")
				if(isSuper.checked) {
					changeColor()
				}
				else{
					counterReact.style.color = `var(--interactive-normal)`;
					reaction.style.borderColor = ``;
				}
			}
		}
		
		function save(){
			fetch(emoteImg.src)
			.then(function(response) {
			  return response.blob();
			})
			.then(function(myBlob) {
			  const objectURL = URL.createObjectURL(myBlob);
			  emoteImg.src = objectURL;
			  setTimeout(()=>{
					html2canvas(reaction, {
						backgroundColor: null,
						scale: 1,
					})
				  .then(canvas => {
					dataURIToSave = canvas.toDataURL()
					<!-- resultImage.innerHTML = '' -->
					<!-- resultImage.appendChild(canvas) -->
					downloadURI(canvas.toDataURL())
				  });

			  },500)
			});
		
	  }

	function downloadURI(uri) {
		var link = document.createElement("a");
		link.download = (source.value || "958285184178991144")+".png";
		link.href = uri;
		document.body.appendChild(link);
		link.click();
		document.body.removeChild(link);
		delete link;
	}
	</script>
